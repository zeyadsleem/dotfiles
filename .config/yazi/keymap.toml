#:schema https://yazi-rs.github.io/schemas/keymap.json
# Default keymaps: https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/keymap.toml

[[mgr.prepend_keymap]]
on = "l"
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on = "<Enter>"
run = "plugin smart-enter"
desc = "Enter directory or choose file"

# Smart paste
[[mgr.prepend_keymap]]
on = "p"
run = "plugin smart-paste"
desc = "Paste into the hovered directory or CWD"

# Toggle / maximize preview pane
[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane min-preview"
desc = "Show or hide preview pane"

[[mgr.prepend_keymap]]
on = "F"
run = "plugin toggle-pane max-preview"
desc = "Maximize or restore preview pane"

# Zoxide jump
[[mgr.prepend_keymap]]
on = "z"
run = "plugin zoxide"
desc = "Zoxide jump"

# Search inside files (Ripgrep via fg plugin)
[[mgr.prepend_keymap]]
on = "<C-f>"
run = "plugin fg"
desc = "Search inside files (interactive)"

# Fuzzy search filenames (fzf via fg plugin)
[[mgr.prepend_keymap]]
on = "<C-s>"
run = "plugin fg fzf"
desc = "Fuzzy search filenames"

# Quit normally without choosing
[[mgr.prepend_keymap]]
on = "q"
run = "close"
desc = "Close yazi"

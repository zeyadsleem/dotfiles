# ============================================================================
# Font Settings
# ============================================================================
# Main font: JetBrainsMono Nerd Font (Better readability and perfect icons/borders)
font_family      Maple Mono NF Medium
bold_font        Maple Mono NF Bold
italic_font      Maple Mono NF Medium Italic
bold_italic_font Maple Mono NF Bold Italic
font_size        11.3

# Arabic Font: DejaVu Sans Mono provides excellent and consistent Arabic rendering.
symbol_map U+0600-U+06FF,U+0750-U+077F,U+08A0-U+08FF,U+FB50-U+FDFF,U+FE70-U+FEFF DejaVu Sans Mono

# Scaling and Rendering
modify_font cell_height 115%
modify_font cell_width 105%
text_composition_strategy legacy

# Disable ligatures only when cursor is over them
# disable_ligatures cursor

# ============================================================================
# Cursor Settings
# ============================================================================
# cursor_shape beam
# cursor_beam_thickness 1.5
# cursor_blink_interval 0
# cursor_stop_blinking_after 15.0

# ============================================================================
# Window Settings
# ============================================================================
window_padding_width 3
window_margin_width 0
confirm_os_window_close 0
remember_window_size  yes
initial_window_width  1100
initial_window_height 700
hide_window_decorations yes
placement_strategy center

background_opacity 0.9
# dynamic_background_opacity yes

# ============================================================================
# Scrollback
# ============================================================================
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

# ============================================================================
# Mouse
# ============================================================================
mouse_hide_wait 3.0
url_style curly
open_url_with default
url_prefixes http https file ftp gemini irc gopher mailto news git
detect_urls yes
copy_on_select yes
strip_trailing_spaces smart
focus_follows_mouse no
pointer_shape_when_grabbed arrow
default_pointer_shape beam
pointer_shape_when_dragging beam

# ============================================================================
# Performance
# ============================================================================
repaint_delay 8
input_delay 1
sync_to_monitor yes

# ============================================================================
# Bell
# ============================================================================
enable_audio_bell yes
visual_bell_duration 1.0
window_alert_on_bell yes
bell_on_tab "🔔 "

# ============================================================================
# Tab Bar
# ============================================================================
tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style powerline
tab_bar_align left
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_powerline_style slanted
tab_active_font_style   bold
tab_inactive_font_style normal

# ============================================================================
# Advanced
# ============================================================================
shell .
editor nvim
allow_remote_control yes
listen_on unix:/tmp/kitty
single_instance yes
update_check_interval 0
startup_session none
clipboard_control write-clipboard write-primary read-clipboard read-primary
term xterm-kitty

# ============================================================================
# OS Specific
# ============================================================================
wayland_titlebar_color system
macos_option_as_alt no
linux_display_server auto

# ============================================================================
# Keyboard Shortcuts
# ============================================================================
clear_all_shortcuts yes

# Functional
map ctrl+shift+f5 load_config_file
map ctrl+shift+f6 debug_config

# Copy/Paste
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map shift+insert  paste_from_selection

# Font size
map ctrl+equal  change_font_size all +2.0
map ctrl+plus   change_font_size all +2.0
map ctrl+kp_add change_font_size all +2.0
map ctrl+minus       change_font_size all -2.0
map ctrl+kp_subtract change_font_size all -2.0
map ctrl+0           change_font_size all 0

# Scrolling
map shift+page_up scroll_page_up
map shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end
map ctrl+shift+h show_scrollback

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+. next_tab
map ctrl+shift+, previous_tab
map ctrl+shift+alt+t set_tab_title

# Windows
map ctrl+shift+enter new_window
map ctrl+shift+w close_window
map ctrl+shift+[ previous_window
map ctrl+shift+] next_window

# Layouts
map ctrl+shift+l next_layout

# Hints
map ctrl+shift+e kitten hints

# Miscellaneous
map ctrl+shift+u kitten unicode_input
map ctrl+shift+escape kitty_shell window

# BEGIN_KITTY_THEME
include ../themes/current/kitty/theme.conf
# END_KITTY_THEME

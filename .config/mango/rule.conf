# =============================================================================
# Window Rules (Mango-native)
# =============================================================================

# =============================================================================
# Auth & System Dialogs
# =============================================================================
windowrule=isfloating:1,appid:polkit-gnome-authentication-agent-1
windowrule=isfloating:1,appid:lxqt-policykit-agent
windowrule=isfloating:1,appid:org.kde.polkit-kde-authentication-agent-1
windowrule=isfloating:1,appid:gcr-prompter
windowrule=isfloating:1,appid:gcr-viewer
windowrule=isfloating:1,appid:xdg-desktop-portal-gtk
windowrule=isfloating:1,appid:xdg-desktop-portal

# =============================================================================
# GTK File Dialogs (portal / native)
# =============================================================================
windowrule=isfloating:1,appid:zenity
windowrule=isfloating:1,appid:yad

# =============================================================================
# Audio & Video
# =============================================================================
windowrule=isfloating:1,appid:pavucontrol
windowrule=isfloating:1,appid:helvum
windowrule=isfloating:1,appid:org.pulseaudio.pavucontrol

# =============================================================================
# Network
# =============================================================================
windowrule=isfloating:1,appid:nm-connection-editor
windowrule=isfloating:1,appid:blueman-manager
windowrule=isfloating:1,appid:blueman-adapters
windowrule=isfloating:1,appid:blueman-sendto

# =============================================================================
# Utilities
# =============================================================================
windowrule=isfloating:1,appid:qalculate-gtk
windowrule=isfloating:1,appid:org.gnome.Calculator
windowrule=isfloating:1,appid:org.gnome.FileRoller
windowrule=isfloating:1,appid:org.gnome.Characters
windowrule=isfloating:1,appid:org.gnome.Loupe
windowrule=isfloating:1,appid:org.gnome.eog
windowrule=isfloating:1,appid:org.gnome.font-viewer
windowrule=isfloating:1,appid:org.gnome.Logs

# =============================================================================
# Disks & System
# =============================================================================
windowrule=isfloating:1,appid:org.gnome.DiskUtility
windowrule=isfloating:1,appid:gpartedbin
windowrule=isfloating:1,appid:gnome-control-center
windowrule=isfloating:1,appid:lxappearance
windowrule=isfloating:1,appid:virt-manager
windowrule=isfloating:1,appid:protonvpn-app

# =============================================================================
# Screenshot Tools
# =============================================================================
windowrule=isfloating:1,appid:flameshot
windowrule=isfloating:1,appid:ksnip
windowrule=isfloating:1,appid:satty

# =============================================================================
# Thunar File Manager Dialogs
# =============================================================================
windowrule=isfloating:1,width:600,height:400,appid:thunar,title:(?i)(file operation progress|confirm to replace|properties|extract|compress)
windowrule=isfloating:1,width:600,height:400,appid:org.freedesktop.FileManager

# =============================================================================
# Browser Dialogs (PiP, downloads, save/open)
# =============================================================================
windowrule=isfloating:1,width:800,height:600,appid:brave,title:(?i)(save file|open file)
windowrule=isfloating:1,appid:brave,title:(?i)(extension|picture-in-picture|picture in picture)

# =============================================================================
# Floating by Title Pattern (generic dialogs)
# =============================================================================
windowrule=isfloating:1,title:(?i)(save as|save file|open file|open folder|open project)
windowrule=isfloating:1,title:(?i)(preferences|settings|options|configuration)
windowrule=isfloating:1,title:(?i)(properties|information|details|about)
windowrule=isfloating:1,title:(?i)(print|printer|printing)
windowrule=isfloating:1,title:(?i)(progress|extracting|compressing|copying)
windowrule=isfloating:1,title:(?i)(update|upgrade|install|remove|uninstall)

# =============================================================================
# Terminal Swallowing (WezTerm)
# =============================================================================
windowrule=isterm:1,appid:wezterm
windowrule=isterm:1,appid:org.wezfurlong.wezterm
windowrule=isterm:1,appid:foot
windowrule=isterm:1,appid:kitty

# =============================================================================
# Scratcpad / Background
# =============================================================================
windowrule=noblur:1,appid:slurp

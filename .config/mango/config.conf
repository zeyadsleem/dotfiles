# =============================================================================
# Mango WM Main Configuration
# =============================================================================

# Source sub-configs
source=~/.config/mango/env.conf
source=~/.config/mango/input.conf
source=~/.config/mango/monitor.conf
source=~/.config/mango/bind.conf
source=~/.config/mango/rule.conf
source=~/.config/mango/tag.conf

# =============================================================================
# Window Effects
# =============================================================================

# Blur
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

# Shadows
shadows=1
layer_shadows=1
shadow_only_floating=0
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x0000007f

# Corner Radius
border_radius=10
no_radius_when_single=0

# Opacity
focused_opacity=1.0
unfocused_opacity=0.9

# =============================================================================
# Animations
# =============================================================================

animations=0
layer_animations=0

# =============================================================================
# Layout Settings
# =============================================================================

# Scroller
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=1

# Dwindle
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# =============================================================================
# Appearance
# =============================================================================

gappih=5
gappiv=5
gappoh=5
gappov=5
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2
no_border_when_single=1

# Colors
rootcolor=0x201b14ff
bordercolor=0x444444ff
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# =============================================================================
# Misc
# =============================================================================

cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1
enable_floating_snap=0
snap_distance=30
focus_cross_monitor=0
focus_cross_tag=0
axis_bind_apply_timeout=100
idleinhibit_ignore_visible=0

# =============================================================================
# Layer Rules
# =============================================================================

layerrule=animation_type_open:zoom,animation_type_close:zoom,layer_name:rofi
layerrule=noanim:1,noblur:1,layer_name:selection
layerrule=noblur:1,layer_name:swaync-notification-window
layerrule=noblur:1,layer_name:swaync-control-center

# =============================================================================
# Autostart
# =============================================================================

exec-once=~/.config/mango/autostart.sh
